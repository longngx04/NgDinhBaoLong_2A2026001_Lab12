# ─── Nginx Load Balancer Configuration ───────────────────
# Routes traffic across multiple agent instances
# Used with: docker compose up --scale agent=3

upstream agent_backend {
    # Docker Compose DNS resolves "agent" to all running instances
    server agent:8000;
}

server {
    listen 80;
    server_name _;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check for Nginx itself
    location /nginx-health {
        return 200 '{"status":"ok","proxy":"nginx"}';
        add_header Content-Type application/json;
    }

    # Proxy all requests to agent backend
    location / {
        proxy_pass http://agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Keep-alive
        proxy_set_header Connection "";
    }
}
